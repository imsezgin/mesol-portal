<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a7a35">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>YESchool — Home</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a7a35;--green-dark:#0f5225;--green-mid:#2ea34d;
  --green-pale:#f0faf2;--green-light:#d4edda;
  --gold:#d4920a;--navy:#1a2a6e;
  --ink:#0d1117;--mid:#4a5568;--muted:#8a96a3;--line:#e2e8f0;
  --white:#ffffff;--bg:#f7f8fa;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink)}

/* ── Top bar ─────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--green);position:sticky;top:0;z-index:50}
.topbar-logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:-1px}
.topbar-logo span{color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:12px}
.streak-pill{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.18);border-radius:20px;padding:5px 12px 5px 8px;font-size:13px;font-weight:700;color:#fff}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--green-dark);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid rgba(255,255,255,.3)}

/* ── Main content ────────────────────────────────── */
.main{padding:20px 16px 100px;max-width:460px;margin:0 auto}

/* Hero card */
.hero{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px}
.hero-greeting{font-size:20px;font-weight:700;margin-bottom:16px;line-height:1.3}
.stats-row{display:flex;gap:10px;margin-bottom:0}
.stat{flex:1;background:var(--green-pale);border-radius:12px;padding:12px 10px;text-align:center}
.stat-value{font-size:22px;font-weight:800;color:var(--green)}
.stat-label{font-size:11px;color:var(--mid);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.stat-value.level-badge{font-size:16px;background:var(--navy);color:#fff;border-radius:8px;display:inline-block;padding:4px 12px}

/* CTA */
.cta-btn{display:block;width:100%;padding:18px;background:var(--green);color:#fff;font-size:17px;font-weight:700;border:none;border-radius:14px;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:20px;letter-spacing:.3px;transition:background .15s,transform .1s;-webkit-appearance:none}
.cta-btn:hover{background:var(--green-mid)}
.cta-btn:active{transform:scale(.98)}

/* Recent activity */
.section-title{font-size:14px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.recent-list{display:flex;flex-direction:column;gap:10px}
.recent-item{display:flex;align-items:center;gap:14px;background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.recent-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.recent-icon.good{background:#d4edda}
.recent-icon.ok{background:#fff3cd}
.recent-icon.low{background:#fdecea}
.recent-info{flex:1;min-width:0}
.recent-title{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-meta{font-size:12px;color:var(--muted);margin-top:2px}
.recent-score{font-size:15px;font-weight:700;white-space:nowrap}
.recent-score.good{color:var(--green)}
.recent-score.ok{color:var(--gold)}
.recent-score.low{color:#c0392b}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;line-height:1.6}
.empty-state .emoji{font-size:40px;margin-bottom:12px}

/* ── Bottom nav ──────────────────────────────────── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bottomnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:56px;text-decoration:none;font-size:11px;font-weight:600;color:var(--muted);gap:3px;-webkit-tap-highlight-color:transparent}
.bottomnav a.active{color:var(--green)}
.bottomnav a svg{width:22px;height:22px}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;height:20px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">YES<span>.</span></div>
  <div class="topbar-right">
    <div class="streak-pill" id="streakPill">🔥 <span id="streakNum">0</span></div>
    <div class="avatar" id="avatar">--</div>
  </div>
</div>

<div class="main">
  <div class="hero">
    <div class="hero-greeting" id="greeting">Good morning</div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-value" id="weeklyCount">0</div>
        <div class="stat-label">This week</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="avgScore">0%</div>
        <div class="stat-label">Avg score</div>
      </div>
      <div class="stat">
        <div class="stat-value"><span class="stat-value level-badge" id="levelBadge">--</span></div>
        <div class="stat-label">Level</div>
      </div>
    </div>
  </div>

  <a class="cta-btn" href="/practice" id="ctaBtn">▶ Start today's practice</a>

  <div class="section-title">Recent activity</div>
  <div class="recent-list" id="recentList">
    <div class="empty-state" id="emptyState">
      <div class="emoji">📚</div>
      Loading your activity...
    </div>
  </div>
</div>

<!-- Bottom nav -->
<nav class="bottomnav">
  <a href="/home" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
  <a href="/practice">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    Practice
  </a>
  <a href="/progress">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
    Progress
  </a>
  <a href="#" onclick="showHelp(event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    Help
  </a>
</nav>

<script>
const TOKEN = localStorage.getItem('yes_token');
const NAME  = localStorage.getItem('yes_name');
const LEVEL = localStorage.getItem('yes_level');

if (!TOKEN) window.location.href = '/';

// Greeting based on time of day
function getGreeting(name) {
  const h = new Date().getHours();
  const first = name ? name.split(' ')[0] : '';
  if (h < 12) return `Good morning, ${first} ☀️`;
  if (h < 17) return `Good afternoon, ${first} 👋`;
  return `Good evening, ${first} 🌙`;
}

// Initials
function getInitials(name) {
  if (!name) return '--';
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2
    ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
    : parts[0].substring(0, 2).toUpperCase();
}

// Format exercise ID for display
function formatExerciseId(id) {
  // W1-S1-forms-gap-EL1 → "Filling in forms"
  const parts = id.split('-');
  const week = parts[0];
  const session = parts[1];
  const topic = parts.slice(2, -2).join(' ');
  return `${week} ${session} — ${topic.charAt(0).toUpperCase() + topic.slice(1)}`;
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

// Set static data immediately
document.getElementById('greeting').textContent = getGreeting(NAME);
document.getElementById('avatar').textContent = getInitials(NAME);
document.getElementById('levelBadge').textContent = LEVEL || '--';

// Fetch dynamic data
async function loadDashboard() {
  try {
    const res = await fetch('/api/student/me', {
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    });

    if (res.status === 401) {
      localStorage.clear();
      window.location.href = '/';
      return;
    }

    const data = await res.json();

    document.getElementById('streakNum').textContent = data.streak || 0;
    document.getElementById('weeklyCount').textContent = data.weeklyCount || 0;
    document.getElementById('avgScore').textContent = (data.avgScore || 0) + '%';
    document.getElementById('levelBadge').textContent = data.level || LEVEL;

    // Recent activity
    const list = document.getElementById('recentList');
    const empty = document.getElementById('emptyState');

    if (!data.recent || data.recent.length === 0) {
      empty.innerHTML = '<div class="emoji">🚀</div>No exercises yet — let\'s start!';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = '';

    data.recent.forEach(r => {
      const pct = Math.round((r.score / r.max_score) * 100);
      const tier = pct >= 70 ? 'good' : pct >= 40 ? 'ok' : 'low';
      const emoji = pct >= 70 ? '✅' : pct >= 40 ? '🟡' : '🔴';

      list.innerHTML += `
        <div class="recent-item">
          <div class="recent-icon ${tier}">${emoji}</div>
          <div class="recent-info">
            <div class="recent-title">${formatExerciseId(r.exercise_id)}</div>
            <div class="recent-meta">${timeAgo(r.completed_at)} · ${r.score}/${r.max_score}</div>
          </div>
          <div class="recent-score ${tier}">${pct}%</div>
        </div>`;
    });

  } catch (err) {
    console.error('Dashboard load error:', err);
    document.getElementById('emptyState').innerHTML = '<div class="emoji">📶</div>Could not load data — check your connection.';
  }
}

function showHelp(e) {
  e.preventDefault();
  alert('Need help?\n\nAsk your teacher or email info@yeschool.uk');
}

loadDashboard();
</script>
</body>
</html>
