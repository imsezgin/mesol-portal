<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a7a35">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>YESchool — Home</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1a7a35;--gd:#0f5225;--gm:#2ea34d;--gp:#f0faf2;--gl:#d4edda;
  --gold:#d4920a;--navy:#1a2a6e;--ink:#0d1117;--mid:#4a5568;
  --muted:#8a96a3;--line:#e2e8f0;--bg:#f7f9fb;--white:#fff;
  --error:#c0392b;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:var(--ink)}

/* TOP BAR */
.topbar{background:var(--g);padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar-logo{font-weight:800;font-size:18px;color:white;letter-spacing:-0.5px;flex:1}
.topbar-logo span{color:var(--gold)}
.streak-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:white;font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px;display:flex;align-items:center;gap:4px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);color:white;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* SCROLL BODY */
.body{padding:0 0 80px}

/* HERO CARD */
.hero{background:linear-gradient(135deg,var(--gd),var(--g));margin:16px;border-radius:16px;padding:20px;color:white;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero-greeting{font-size:11px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.hero-name{font-size:22px;font-weight:800;margin-bottom:16px}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hero-stat{background:rgba(255,255,255,.12);border-radius:10px;padding:10px 8px;text-align:center}
.hero-stat-n{font-size:20px;font-weight:800;line-height:1}
.hero-stat-l{font-size:10px;color:rgba(255,255,255,.65);margin-top:2px}
.level-badge{display:inline-block;background:var(--gold);color:white;font-size:11px;font-weight:800;padding:2px 8px;border-radius:99px}

/* CTA */
.cta-wrap{padding:0 16px;margin-top:16px}
.cta{display:block;width:100%;padding:16px;background:var(--g);color:white;font-size:16px;font-weight:700;border:none;border-radius:14px;text-align:center;cursor:pointer;letter-spacing:0.3px;transition:background .15s}
.cta:hover{background:var(--gm)}
.cta:active{transform:scale(.98)}

/* SECTION */
.section{padding:20px 16px 0}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:12px}

/* RECENT ACTIVITY */
.activity-list{display:flex;flex-direction:column;gap:8px}
.activity-item{background:white;border:1px solid var(--line);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px}
.activity-icon{width:36px;height:36px;border-radius:10px;background:var(--gp);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.activity-info{flex:1}
.activity-title{font-size:14px;font-weight:600;color:var(--ink)}
.activity-meta{font-size:12px;color:var(--muted);margin-top:2px}
.activity-score{font-size:13px;font-weight:700;color:var(--g)}

/* EMPTY STATE */
.empty{text-align:center;padding:32px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:8px}
.empty-text{font-size:14px}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);display:flex;height:60px;box-shadow:0 -2px 12px rgba(0,0,0,.06);z-index:20}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:var(--muted);font-size:10px;font-weight:600;transition:color .15s;min-height:44px}
.nav-item.active{color:var(--g)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* SKELETON LOADER */
.skel{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:skel 1.4s infinite;border-radius:8px;height:18px;margin-bottom:6px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">YES<span>.</span></div>
  <div class="streak-pill" id="streakPill">🔥 <span id="streakCount">0</span> days</div>
  <div class="avatar" id="avatarEl">?</div>
</div>

<div class="body">
  <!-- HERO -->
  <div class="hero">
    <div class="hero-greeting" id="greetingLabel">Good morning</div>
    <div class="hero-name" id="heroName">Loading...</div>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-n" id="statExercises">—</div>
        <div class="hero-stat-l">This week</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-n" id="statScore">—</div>
        <div class="hero-stat-l">Avg score</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-n"><span class="level-badge" id="statLevel">—</span></div>
        <div class="hero-stat-l">Your level</div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <button class="cta" id="startBtn" onclick="startPractice()">Start today's practice →</button>
  </div>

  <!-- RECENT ACTIVITY -->
  <div class="section">
    <div class="section-title">Recent activity</div>
    <div class="activity-list" id="activityList">
      <div class="skel"></div>
      <div class="skel"></div>
      <div class="skel"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottomnav">
  <a class="nav-item active" href="/home">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
  <a class="nav-item" href="/practice">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Practice
  </a>
  <a class="nav-item" href="/progress">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Progress
  </a>
  <a class="nav-item" href="/help">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    Help
  </a>
</nav>

<script>
const TOKEN = localStorage.getItem('yes_token');
const LEVEL = localStorage.getItem('yes_level') || 'EL1';
if (!TOKEN) { window.location.href = '/'; }

// Greeting based on time
const hr = new Date().getHours();
document.getElementById('greetingLabel').textContent =
  hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';

const EXERCISE_ICONS = { gap_fill:'📝', mcq:'❓', vocab_match:'🔗', mesol_combo:'🔢' };

async function loadHome() {
  try {
    const res = await fetch('/api/student/me', {
      headers: { Authorization: 'Bearer ' + TOKEN }
    });
    if (res.status === 401) { localStorage.clear(); window.location.href = '/'; return; }
    const d = await res.json();

    // Avatar
    const initials = d.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('avatarEl').textContent = initials;
    document.getElementById('heroName').textContent = d.name;
    document.getElementById('streakCount').textContent = d.streak;
    document.getElementById('statExercises').textContent = d.weeklyCount;
    document.getElementById('statScore').textContent = d.avgScore ? d.avgScore + '%' : '—';
    document.getElementById('statLevel').textContent = d.level;
    localStorage.setItem('yes_level', d.level);
    localStorage.setItem('yes_name', d.name);

    // Recent activity
    const list = document.getElementById('activityList');
    if (!d.recent || d.recent.length === 0) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📚</div><div class="empty-text">No exercises yet — press Start to begin!</div></div>';
    } else {
      list.innerHTML = d.recent.map(r => {
        const pct = Math.round((r.score / r.max_score) * 100);
        const parts = r.exercise_id.split('-');
        const topic = parts.slice(2, parts.length - 1).join(' ') || r.exercise_id;
        const type = parts[2] || 'exercise';
        const icon = EXERCISE_ICONS[type] || '📝';
        const date = new Date(r.completed_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
        return `<div class="activity-item">
          <div class="activity-icon">${icon}</div>
          <div class="activity-info">
            <div class="activity-title">${topic}</div>
            <div class="activity-meta">${date}</div>
          </div>
          <div class="activity-score">${pct}%</div>
        </div>`;
      }).join('');
    }
  } catch(e) {
    console.error(e);
  }
}

async function startPractice() {
  const btn = document.getElementById('startBtn');
  btn.textContent = 'Loading...';
  btn.disabled = true;
  try {
    // Find first uncompleted exercise for student's level
    const res = await fetch(`/api/student/next-exercise`, {
      headers: { Authorization: 'Bearer ' + TOKEN }
    });
    if (res.ok) {
      const d = await res.json();
      window.location.href = `/exercise?id=${d.id}&level=${d.level}`;
    } else {
      window.location.href = '/practice';
    }
  } catch {
    window.location.href = '/practice';
  }
}

loadHome();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
