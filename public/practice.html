<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a7a35">
<title>YESchool — Practice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1a7a35;--gd:#0f5225;--gp:#f0faf2;--gl:#d4edda;--gold:#d4920a;--navy:#1a2a6e;--ink:#0d1117;--mid:#4a5568;--muted:#8a96a3;--line:#e2e8f0;--bg:#f7f9fb;--white:#fff;}
html,body{min-height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:var(--ink)}

.topbar{background:var(--g);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.topbar-logo{font-weight:800;font-size:18px;color:white;letter-spacing:-0.5px}
.topbar-logo span{color:var(--gold)}
.topbar-title{font-size:15px;font-weight:700;color:white;flex:1}

.body{padding:16px 16px 80px}

/* LEVEL BADGE */
.level-strip{background:white;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.level-badge{display:inline-block;font-size:12px;font-weight:800;padding:3px 12px;border-radius:99px;color:white}
.level-EL1{background:#1565c0}
.level-EL2{background:#6a1b9a}
.level-EL3{background:var(--gold)}
.level-text{font-size:13px;color:var(--mid)}

/* WEEK FILTER */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--line);background:white;color:var(--mid);transition:all .15s}
.filter-chip.active{background:var(--g);border-color:var(--g);color:white}

/* EXERCISE CARDS */
.ex-list{display:flex;flex-direction:column;gap:10px}
.ex-card{background:white;border:1px solid var(--line);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none;transition:box-shadow .15s}
.ex-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.ex-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ex-icon-gf{background:#e8f5e9}
.ex-icon-mcq{background:#e8eaf6}
.ex-icon-vm{background:#fff8e1}
.ex-icon-mc{background:#e3f2fd}
.ex-info{flex:1}
.ex-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px}
.ex-meta{font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ex-tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;background:var(--bg);border:1px solid var(--line);color:var(--mid)}
.ex-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.ex-tick{font-size:20px;color:var(--g)}
.ex-score{font-size:12px;font-weight:700;color:var(--g)}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);display:flex;height:60px;box-shadow:0 -2px 12px rgba(0,0,0,.06);z-index:20}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:var(--muted);font-size:10px;font-weight:600;min-height:44px}
.nav-item.active{color:var(--g)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">YES<span>.</span></div>
  <div class="topbar-title">Practice</div>
</div>

<div class="body">
  <div class="level-strip">
    <span class="level-badge" id="levelBadge">EL1</span>
    <span class="level-text">Showing exercises for your level</span>
  </div>

  <div class="filter-row" id="filterRow">
    <div class="filter-chip active" data-week="all" onclick="setFilter('all')">All weeks</div>
    <div class="filter-chip" data-week="1" onclick="setFilter('1')">Week 1</div>
    <div class="filter-chip" data-week="2" onclick="setFilter('2')">Week 2</div>
    <div class="filter-chip" data-week="3" onclick="setFilter('3')">Week 3</div>
    <div class="filter-chip" data-week="4" onclick="setFilter('4')">Week 4</div>
    <div class="filter-chip" data-week="5" onclick="setFilter('5')">Week 5</div>
    <div class="filter-chip" data-week="6" onclick="setFilter('6')">Week 6</div>
  </div>

  <div class="loading" id="loadingState"><div class="spinner"></div>Loading exercises...</div>
  <div class="ex-list" id="exList" style="display:none"></div>
</div>

<nav class="bottomnav">
  <a class="nav-item" href="/home">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
  </a>
  <a class="nav-item active" href="/practice">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Practice
  </a>
  <a class="nav-item" href="/progress">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Progress
  </a>
  <a class="nav-item" href="/help">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Help
  </a>
</nav>

<script>
const TOKEN = localStorage.getItem('yes_token');
const LEVEL = localStorage.getItem('yes_level') || 'EL1';
if (!TOKEN) window.location.href = '/';

document.getElementById('levelBadge').textContent = LEVEL;
document.getElementById('levelBadge').className = 'level-badge level-' + LEVEL;

const TYPE_ICONS = { gap_fill:'📝', mcq:'❓', vocab_match:'🔗', mesol_combo:'🔢' };
const TYPE_LABELS = { gap_fill:'Gap fill', mcq:'Multiple choice', vocab_match:'Vocab match', mesol_combo:'English + Maths' };
const TYPE_CLASSES = { gap_fill:'ex-icon-gf', mcq:'ex-icon-mcq', vocab_match:'ex-icon-vm', mesol_combo:'ex-icon-mc' };

let allExercises = [];
let completedMap = {};
let currentFilter = 'all';

// Fetch exercise list from server
async function loadExercises() {
  try {
    // Get completed exercises
    const res = await fetch('/api/student/progress', {
      headers: { Authorization: 'Bearer ' + TOKEN }
    });
    if (res.ok) {
      const d = await res.json();
      (d.results || []).forEach(r => {
        if (!completedMap[r.exercise_id] || r.score / r.max_score > completedMap[r.exercise_id]) {
          completedMap[r.exercise_id] = Math.round((r.score / r.max_score) * 100);
        }
      });
    }

    // Get exercise index
    const idxRes = await fetch(`/api/exercises/${LEVEL}`);
    if (idxRes.ok) {
      allExercises = await idxRes.json();
    } else {
      // Fallback: build list from known naming pattern
      allExercises = buildFallbackList();
    }

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('exList').style.display = 'flex';
    renderList();
  } catch(e) {
    document.getElementById('loadingState').innerHTML = '<div style="color:var(--muted)">Could not load exercises.</div>';
  }
}

function buildFallbackList() {
  // Known exercise IDs based on generated content
  const ids = [];
  for (let w = 1; w <= 6; w++) {
    for (let s = 1; s <= 2; s++) {
      ids.push({ id: `W${w}-S${s}-`, week: w });
    }
  }
  return ids;
}

function setFilter(week) {
  currentFilter = week;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.week === week));
  renderList();
}

function renderList() {
  const list = document.getElementById('exList');
  const filtered = currentFilter === 'all'
    ? allExercises
    : allExercises.filter(e => String(e.week) === currentFilter);

  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>No exercises for this week yet</div></div>';
    return;
  }

  list.innerHTML = filtered.map(ex => {
    const done = completedMap[ex.id] !== undefined;
    const score = completedMap[ex.id];
    const icon = TYPE_ICONS[ex.type] || '📝';
    const iconClass = TYPE_CLASSES[ex.type] || 'ex-icon-gf';
    const typeLabel = TYPE_LABELS[ex.type] || ex.type;
    return `<a class="ex-card" href="/exercise?id=${ex.id}&level=${LEVEL}">
      <div class="ex-icon ${iconClass}">${icon}</div>
      <div class="ex-info">
        <div class="ex-title">${ex.title}</div>
        <div class="ex-meta">
          <span>Week ${ex.week}</span>
          <span class="ex-tag">${typeLabel}</span>
          ${ex.topic ? `<span class="ex-tag">${ex.topic}</span>` : ''}
        </div>
      </div>
      <div class="ex-right">
        ${done ? `<div class="ex-tick">✓</div><div class="ex-score">${score}%</div>` : '<div style="font-size:13px;color:var(--muted)">→</div>'}
      </div>
    </a>`;
  }).join('');
}

loadExercises();
</script>
</body>
</html>
