<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YESchool — Teacher Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1a7a35;--gd:#0f5225;--gp:#f0faf2;--gl:#d4edda;--gold:#d4920a;--navy:#1a2a6e;--ink:#0d1117;--mid:#4a5568;--muted:#8a96a3;--line:#e2e8f0;--bg:#f7f9fb;--white:#fff;--error:#c0392b;--error-bg:#fdecea;}
html,body{min-height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--ink)}

/* NAV */
nav{background:var(--gd);height:52px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nav-logo{font-weight:800;font-size:17px;color:white;letter-spacing:-0.5px}
.nav-logo span{color:var(--gold)}
.nav-tag{font-size:11px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.7);padding:2px 10px;border-radius:99px}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav-user{font-size:12px;color:rgba(255,255,255,.6)}
.btn-sm{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:rgba(255,255,255,.1);color:white;transition:background .15s}
.btn-sm:hover{background:rgba(255,255,255,.2)}

/* LOGIN */
.login-wrap{min-height:calc(100vh - 52px);display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:white;border:1px solid var(--line);border-radius:16px;padding:32px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-card h2{font-size:20px;margin-bottom:4px}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:24px}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:28px 24px 60px;display:none}
.page-head{margin-bottom:24px}
.page-title{font-size:22px;font-weight:700}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:white;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
.stat-n{font-size:28px;font-weight:800;color:var(--g);line-height:1;margin-bottom:4px}
.stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}

/* SEARCH + FILTER */
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:200px;padding:9px 12px;border:2px solid var(--line);border-radius:8px;font-size:13px;outline:none;transition:border-color .15s}
.toolbar input:focus{border-color:var(--g)}
.filter-btn{padding:9px 14px;border:2px solid var(--line);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:white;color:var(--mid);transition:all .15s}
.filter-btn.active{border-color:var(--g);color:var(--g);background:var(--gp)}

/* TABLE */
.table-wrap{background:white;border:1px solid var(--line);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--ink);color:white;padding:11px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gp);cursor:pointer}

.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
.b-el1{background:#e3f2fd;color:#1565c0}
.b-el2{background:#f3e5f5;color:#6a1b9a}
.b-el3{background:#fff8e1;color:#e65100}
.b-mesol{background:var(--gl);color:var(--gd)}
.b-esol{background:#e8eaf6;color:var(--navy)}
.b-ge{background:#fce4ec;color:#880e4f}

.streak-pill{font-size:11px;font-weight:700;color:var(--g);background:var(--gp);padding:2px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:3px}
.score-bar-wrap{background:var(--bg);border-radius:99px;height:6px;width:80px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.score-bar{height:100%;border-radius:99px;background:var(--g)}
.last-active{font-size:12px;color:var(--muted)}
.na{color:var(--muted);font-style:italic}

/* STUDENT DETAIL PANEL */
.panel-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-start;justify-content:flex-end}
.panel-backdrop.show{display:flex}
.panel{background:white;width:440px;max-width:100vw;height:100vh;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.12);padding:0}
.panel-head{background:var(--g);color:white;padding:20px 24px;position:sticky;top:0}
.panel-close{float:right;background:rgba(255,255,255,.15);border:none;color:white;cursor:pointer;border-radius:6px;padding:4px 10px;font-size:16px}
.panel-name{font-size:20px;font-weight:700;margin-bottom:4px}
.panel-meta{font-size:13px;color:rgba(255,255,255,.75);display:flex;gap:10px;flex-wrap:wrap}
.panel-body{padding:20px 24px}
.panel-section{margin-bottom:24px}
.panel-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:12px}
.result-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.result-row:last-child{border-bottom:none}
.result-id{flex:1;color:var(--ink);font-weight:500}
.result-score{font-weight:700;color:var(--g)}
.result-date{font-size:11px;color:var(--muted)}

/* FORM */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mid);margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:9px 12px;border:2px solid var(--line);border-radius:8px;font-size:13px;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{border-color:var(--g)}

.btn-primary{padding:10px 20px;background:var(--g);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#2ea34d}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.alert.show{display:block}
.alert-success{background:var(--gp);color:var(--gd);border:1px solid var(--gl)}
.alert-error{background:var(--error-bg);color:var(--error);border:1px solid #f5c6cb}

@media(max-width:640px){.stats-row{grid-template-columns:repeat(2,1fr)}.panel{width:100vw}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">YES<span>.</span></div>
  <span class="nav-tag">Teacher</span>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <button class="btn-sm" onclick="logout()">Sign out</button>
    <a href="/admin" class="btn-sm" style="text-decoration:none">Admin ↗</a>
  </div>
</nav>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h2>Teacher login</h2>
    <p>Dashboard access for YESchool staff</p>
    <div class="form-group">
      <label>Email</label><input type="email" id="emailInput" placeholder="Enter your email" style="margin-bottom:10px"><br><label>Password</label>
      <input type="password" id="passInput" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="alert alert-error" id="loginErr">Incorrect password</div>
    <button class="btn-primary" style="width:100%" onclick="doLogin()">Sign in</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="main" id="mainApp">
  <div class="page-head">
    <div class="page-title">Cohort Dashboard</div>
    <div class="page-sub" id="pageSubtitle">Loading cohort data...</div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="sTotal">—</div><div class="stat-l">Students</div></div>
    <div class="stat"><div class="stat-n" id="sActive">—</div><div class="stat-l">Active this week</div></div>
    <div class="stat"><div class="stat-n" id="sAvgScore">—</div><div class="stat-l">Avg score</div></div>
    <div class="stat"><div class="stat-n" id="sAvgStreak">—</div><div class="stat-l">Avg streak</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search student..." oninput="filterTable()">
    <button class="filter-btn active" data-prog="all" onclick="setProg('all')">All</button>
    <button class="filter-btn" data-prog="MESOL" onclick="setProg('MESOL')">MESOL</button>
    <button class="filter-btn" data-prog="ESOL" onclick="setProg('ESOL')">ESOL</button>
    <button class="filter-btn" data-prog="GE" onclick="setProg('GE')">GE</button>
    <button class="btn-sm" style="background:var(--g);border:none;color:white;padding:9px 14px;border-radius:8px;font-size:12px" onclick="loadCohort()">↻ Refresh</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Level</th>
          <th>Programme</th>
          <th>This week</th>
          <th>Avg score</th>
          <th>Streak</th>
          <th>Last active</th>
        </tr>
      </thead>
      <tbody id="cohortBody">
        <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted)">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- STUDENT DETAIL PANEL -->
<div class="panel-backdrop" id="panelBackdrop" onclick="closePanel(event)">
  <div class="panel" id="detailPanel">
    <div class="panel-head">
      <button class="panel-close" onclick="closePanelDirect()">✕</button>
      <div class="panel-name" id="panelName">Student</div>
      <div class="panel-meta" id="panelMeta"></div>
    </div>
    <div class="panel-body" id="panelBody">Loading...</div>
  </div>
</div>

<script>
const TOKEN_KEY = 'yes_teacher_token';
let allStudents = [];
let currentProg = 'all';

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('emailInput').value; const pass = document.getElementById('passInput').value;
  const res = await fetch('/api/auth/teacher', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: pass })
  });
  if (!res.ok) { document.getElementById('loginErr').classList.add('show'); return; }
  const d = await res.json();
  localStorage.setItem(TOKEN_KEY, d.token);
  showApp();
}

function logout() { localStorage.removeItem(TOKEN_KEY); location.reload(); }

function getToken() { return localStorage.getItem(TOKEN_KEY); }

function showApp() {
  if (!getToken()) return;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  try { const payload = JSON.parse(atob(getToken().split('.')[1])); document.getElementById('navUser').textContent = payload.name || 'Teacher'; } catch { document.getElementById('navUser').textContent = 'Teacher'; }
  loadCohort();
}

// ── COHORT ────────────────────────────────────────────────────
async function loadCohort() {
  const res = await fetch('/api/teacher/cohort', { headers: { Authorization: 'Bearer ' + getToken() } });
  if (!res.ok) { logout(); return; }
  const d = await res.json();
  allStudents = d.cohort || [];

  // Stats
  document.getElementById('sTotal').textContent = allStudents.length;
  const active = allStudents.filter(s => s.weeklyCount > 0).length;
  document.getElementById('sActive').textContent = active;
  const scores = allStudents.filter(s => s.avgScore !== null).map(s => s.avgScore);
  document.getElementById('sAvgScore').textContent = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) + '%' : '—';
  const streaks = allStudents.map(s => s.streak);
  document.getElementById('sAvgStreak').textContent = streaks.length ? Math.round(streaks.reduce((a,b)=>a+b,0)/streaks.length) : '—';
  document.getElementById('pageSubtitle').textContent = `${allStudents.length} students · as of ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;

  filterTable();
}

function setProg(prog) {
  currentProg = prog;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.prog === prog));
  filterTable();
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allStudents.filter(s =>
    (currentProg === 'all' || s.programme === currentProg) &&
    s.name.toLowerCase().includes(q)
  );
  renderTable(filtered);
}

function renderTable(students) {
  const tbody = document.getElementById('cohortBody');
  if (!students.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted)">No students found</td></tr>';
    return;
  }
  tbody.innerHTML = students.map(s => {
    const lastActive = s.lastActive ? new Date(s.lastActive).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '—';
    const scoreBar = s.avgScore !== null
      ? `<div class="score-bar-wrap"><div class="score-bar" style="width:${s.avgScore}%"></div></div>${s.avgScore}%`
      : '<span class="na">No data</span>';
    return `<tr onclick="openPanel('${s.id}')">
      <td><strong>${s.name}</strong></td>
      <td><span class="badge b-${s.level.toLowerCase()}">${s.level}</span></td>
      <td><span class="badge b-${s.programme.toLowerCase()}">${s.programme}</span></td>
      <td>${s.weeklyCount > 0 ? `<strong style="color:var(--g)">${s.weeklyCount}</strong>` : '<span class="na">0</span>'}</td>
      <td>${scoreBar}</td>
      <td>${s.streak > 0 ? `<span class="streak-pill">🔥 ${s.streak}</span>` : '<span class="na">—</span>'}</td>
      <td class="last-active">${lastActive}</td>
    </tr>`;
  }).join('');
}

// ── STUDENT DETAIL ─────────────────────────────────────────────
async function openPanel(id) {
  document.getElementById('panelBackdrop').classList.add('show');
  document.getElementById('panelBody').innerHTML = '<div style="padding:20px;color:var(--muted)">Loading...</div>';

  const res = await fetch('/api/teacher/student/' + id, { headers: { Authorization: 'Bearer ' + getToken() } });
  if (!res.ok) return;
  const d = await res.json();
  const s = d.student;
  const results = d.results || [];
  const streak = d.streak;

  document.getElementById('panelName').textContent = s.name;
  document.getElementById('panelMeta').innerHTML = `
    <span>${s.level} · ${s.programme}</span>
    <span>${s.phone}</span>
    ${streak ? `<span>🔥 ${streak.current_days} day streak</span>` : ''}
  `;

  const overall = results.length
    ? Math.round(results.reduce((a, r) => a + (r.score/r.max_score*100), 0) / results.length)
    : null;

  const resultsHtml = results.length ? results.map(r => {
    const pct = Math.round((r.score / r.max_score) * 100);
    const date = new Date(r.completed_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
    return `<div class="result-row">
      <div class="result-id">${r.exercise_id}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-date">${date}</div>
    </div>`;
  }).join('') : '<div style="color:var(--muted);font-size:13px">No exercises completed yet</div>';

  document.getElementById('panelBody').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Summary</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:var(--gp);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:24px;font-weight:800;color:var(--g)">${results.length}</div>
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px">Total done</div>
        </div>
        <div style="background:var(--gp);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:24px;font-weight:800;color:var(--g)">${overall !== null ? overall + '%' : '—'}</div>
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px">Overall avg</div>
        </div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">All results</div>
      ${resultsHtml}
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Reset PIN</div>
      <div class="alert alert-success" id="resetOk">PIN updated successfully.</div>
      <div class="alert alert-error" id="resetErr">Failed to reset PIN.</div>
      <div style="display:flex;gap:8px">
        <input type="text" id="newPinInput" placeholder="New 4-digit PIN (e.g. 1989)" maxlength="4" style="flex:1;padding:9px 12px;border:2px solid var(--line);border-radius:8px;font-size:13px;outline:none">
        <button class="btn-primary" onclick="resetPin('${id}')">Set PIN</button>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">Use student's birth year as their PIN (e.g. 1989)</div>
    </div>
  `;
}

async function resetPin(id) {
  const pin = document.getElementById('newPinInput').value.trim();
  const okEl = document.getElementById('resetOk');
  const errEl = document.getElementById('resetErr');
  okEl.classList.remove('show'); errEl.classList.remove('show');

  if (!/^\d{4}$/.test(pin)) { errEl.textContent = 'PIN must be 4 digits.'; errEl.classList.add('show'); return; }

  // Use the students route to reset — pass new PIN
  const res = await fetch('/api/students/' + id + '/reset-pin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + getToken() },
    body: JSON.stringify({ pin })
  });
  if (res.ok) {
    okEl.classList.add('show');
    loadCohort();
  } else {
    errEl.textContent = 'Failed to reset PIN.';
    errEl.classList.add('show');
  }
}

function closePanel(e) { if (e.target === document.getElementById('panelBackdrop')) closePanelDirect(); }
function closePanelDirect() { document.getElementById('panelBackdrop').classList.remove('show'); }

// ── INIT ──────────────────────────────────────────────────────
if (getToken()) showApp();
</script>
</body>
</html>
