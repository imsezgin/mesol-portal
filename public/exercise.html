<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a7a35">
<title>YESchool — Exercise</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1a7a35;--gd:#0f5225;--gm:#2ea34d;--gp:#f0faf2;--gl:#d4edda;
  --gold:#d4920a;--navy:#1a2a6e;--navy2:#e8eaf6;--ink:#0d1117;--mid:#4a5568;
  --muted:#8a96a3;--line:#e2e8f0;--bg:#f7f9fb;--white:#fff;
  --error:#c0392b;--error-bg:#fdecea;
}
html,body{min-height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:var(--ink)}

/* HEADER */
.header{background:var(--g);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.back-btn{color:white;font-size:22px;cursor:pointer;padding:4px;background:none;border:none;line-height:1}
.header-info{flex:1}
.header-topic{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}
.header-title{font-size:16px;font-weight:700;color:white}
.progress-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.2)}
.progress-bar{height:100%;background:var(--gold);transition:width .3s}

/* BODY */
.body{padding:20px 16px 100px;max-width:560px;margin:0 auto}

/* CONTEXT BOX */
.context-box{background:white;border:1px solid var(--line);border-left:4px solid var(--g);border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:13.5px;line-height:1.65;color:var(--mid)}
.context-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g);margin-bottom:6px}

/* SECTION HEADER (mesol_combo) */
.section-header{background:var(--navy);color:white;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-weight:700;font-size:14px}
.section-header.english{background:var(--g)}

/* INSTRUCTION */
.instruction{font-size:14px;color:var(--mid);margin-bottom:20px;line-height:1.6}

/* GAP FILL */
.passage{font-size:15px;line-height:2.2;margin-bottom:20px;background:white;border:1px solid var(--line);border-radius:12px;padding:16px}
.blank{display:inline-block;min-width:80px;height:30px;border-bottom:2px solid var(--g);margin:0 4px;vertical-align:middle;text-align:center;font-weight:700;color:var(--g);font-size:14px;cursor:pointer;padding:0 6px;border-radius:4px 4px 0 0;transition:background .15s}
.blank:hover{background:var(--gp)}
.blank.filled{background:var(--gp);border-bottom-color:var(--gd)}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.chip{background:white;border:2px solid var(--line);border-radius:99px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--ink)}
.chip:hover{border-color:var(--g);color:var(--g);background:var(--gp)}
.chip.used{opacity:.35;cursor:default;pointer-events:none}
.chip.selected{border-color:var(--g);background:var(--g);color:white}

/* MCQ */
.question-text{font-size:16px;font-weight:600;line-height:1.55;margin-bottom:20px;color:var(--ink)}
.question-counter{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600}
.options{display:flex;flex-direction:column;gap:10px}
.option{background:white;border:2px solid var(--line);border-radius:12px;padding:14px 16px;font-size:14px;font-weight:500;cursor:pointer;text-align:left;transition:all .2s;line-height:1.5}
.option:hover{border-color:var(--g);background:var(--gp)}
.option.correct{border-color:var(--g);background:var(--gl);color:var(--gd)}
.option.wrong{border-color:var(--error);background:var(--error-bg);color:var(--error)}
.option:disabled{cursor:default}

/* VOCAB MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.match-col-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:8px;text-align:center}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{background:white;border:2px solid var(--line);border-radius:10px;padding:11px 12px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;line-height:1.4;min-height:52px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.match-item:hover{border-color:var(--g);background:var(--gp)}
.match-item.selected{border-color:var(--g);background:var(--g);color:white}
.match-item.matched{border-color:var(--gm);background:var(--gl);color:var(--gd);cursor:default;pointer-events:none}
.match-item.wrong{animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}60%{transform:translateX(6px)}}

/* SUBMIT BUTTON */
.submit-btn{width:100%;padding:16px;background:var(--g);color:white;font-size:16px;font-weight:700;border:none;border-radius:14px;cursor:pointer;margin-top:16px;transition:background .15s}
.submit-btn:hover{background:var(--gm)}
.submit-btn:disabled{background:var(--muted);cursor:not-allowed}

/* SCORE SCREEN */
.score-screen{display:none;text-align:center;padding:32px 20px}
.score-screen.show{display:block}
.score-ring{width:140px;height:140px;border-radius:50%;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;border:6px solid var(--g)}
.score-ring.high{border-color:var(--g);background:var(--gp)}
.score-ring.mid{border-color:var(--gold);background:var(--gold)10}
.score-ring.low{border-color:var(--error);background:var(--error-bg)}
.score-pct{font-size:42px;line-height:1;color:var(--g)}
.score-pct.mid{color:var(--gold)}
.score-pct.low{color:var(--error)}
.score-emoji{font-size:28px;margin-bottom:4px}
.score-label{font-size:18px;font-weight:700;margin-bottom:8px}
.score-sub{font-size:14px;color:var(--muted);margin-bottom:28px}
.score-breakdown{background:white;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:24px;text-align:left}
.score-breakdown-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.score-breakdown-row:last-child{border-bottom:none;font-weight:700}
.score-actions{display:flex;gap:10px}
.btn-retry{flex:1;padding:14px;background:var(--bg);border:2px solid var(--line);color:var(--ink);font-size:15px;font-weight:700;border-radius:12px;cursor:pointer}
.btn-next{flex:2;padding:14px;background:var(--g);color:white;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.loading-spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header" id="header">
  <button class="back-btn" onclick="goBack()">←</button>
  <div class="header-info">
    <div class="header-topic" id="headerTopic">Loading...</div>
    <div class="header-title" id="headerTitle"></div>
  </div>
  <div style="font-size:12px;color:rgba(255,255,255,.65)" id="headerProgress"></div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</div>

<div class="body">
  <div class="loading" id="loadingState">
    <div class="loading-spinner"></div>
    <div>Loading exercise...</div>
  </div>

  <div id="exerciseContent" style="display:none"></div>

  <div class="score-screen" id="scoreScreen">
    <div class="score-ring" id="scoreRing">
      <div class="score-emoji" id="scoreEmoji">🎉</div>
      <div class="score-pct" id="scorePct">0%</div>
    </div>
    <div class="score-label" id="scoreLabel">Well done!</div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="score-breakdown" id="scoreBreakdown"></div>
    <div class="score-actions">
      <button class="btn-retry" onclick="retryExercise()">↺ Retry</button>
      <button class="btn-next" onclick="nextExercise()">Next exercise →</button>
    </div>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('yes_token');
if (!TOKEN) window.location.href = '/';

const params = new URLSearchParams(window.location.search);
const EXERCISE_ID = params.get('id');
const LEVEL = params.get('level') || localStorage.getItem('yes_level') || 'EL1';

let exercise = null;
let state = { selected: null, blanks: [], answers: [], matches: {}, currentQ: 0, correct: 0, total: 0, startTime: Date.now(), comboSection: 'english', comboEnglishScore: {correct:0,total:0}, comboMathsScore: {correct:0,total:0} };

// Save progress on exit
window.addEventListener('beforeunload', saveProgress);
function saveProgress() {
  if (exercise && state.total > 0) {
    localStorage.setItem('progress_' + EXERCISE_ID, JSON.stringify(state));
  }
}

async function loadExercise() {
  if (!EXERCISE_ID) { window.location.href = '/practice'; return; }
  try {
    const res = await fetch(`/content/${LEVEL}/${EXERCISE_ID}.json`);
    if (!res.ok) throw new Error('Not found');
    exercise = await res.json();

    // Restore saved progress
    const saved = localStorage.getItem('progress_' + EXERCISE_ID);
    if (saved) {
      try { const s = JSON.parse(saved); if (s && s.total < s.correct + 1) Object.assign(state, s); } catch {}
    }

    document.getElementById('headerTopic').textContent = 'Week ' + exercise.week + ' · ' + exercise.topic;
    document.getElementById('headerTitle').textContent = exercise.title;
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('exerciseContent').style.display = 'block';
    renderExercise();
  } catch(e) {
    document.getElementById('loadingState').innerHTML = '<div style="color:var(--error)">Exercise not found. <a href="/practice">Back to practice</a></div>';
  }
}

function renderExercise() {
  const el = document.getElementById('exerciseContent');
  const type = exercise.type === 'mesol_combo' ? (state.comboSection === 'english' ? 'mcq_combo_english' : 'mcq_combo_maths') : exercise.type;

  if (exercise.type === 'mesol_combo') {
    const section = state.comboSection === 'english' ? exercise.english_section : exercise.maths_section;
    renderMCQ(el, section, true);
  } else if (exercise.type === 'mcq') {
    renderMCQ(el, exercise, false);
  } else if (exercise.type === 'gap_fill') {
    renderGapFill(el);
  } else if (exercise.type === 'vocab_match') {
    renderVocabMatch(el);
  }
}

// ── GAP FILL ──────────────────────────────────────────────────
function renderGapFill(el) {
  state.blanks = Array(exercise.blanks.length).fill(null);
  state.total = exercise.blanks.length;

  let passageHtml = exercise.passage;
  let i = 0;
  passageHtml = passageHtml.replace(/___/g, () => `<span class="blank" id="blank-${i}" onclick="blankClick(${i++})"></span>`);

  const chips = [...exercise.word_bank].sort(() => Math.random() - 0.5);

  el.innerHTML = `
    <p class="instruction">${exercise.instruction}</p>
    ${exercise.context ? `<div class="context-box"><div class="context-label">Context</div>${exercise.context}</div>` : ''}
    <div class="passage">${passageHtml}</div>
    <div class="section-title" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px">Word bank</div>
    <div class="word-bank" id="wordBank">
      ${chips.map((c,idx) => `<div class="chip" id="chip-${idx}" onclick="chipClick(${idx},'${c}')">${c}</div>`).join('')}
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitGapFill()" disabled>Check answers</button>
  `;
  updateProgress();
}

let selectedChipIdx = null;
let selectedBlankIdx = null;

function chipClick(idx, word) {
  // Deselect if already selected
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  if (selectedChipIdx === idx) { selectedChipIdx = null; return; }
  selectedChipIdx = idx;
  document.getElementById('chip-' + idx).classList.add('selected');
  // If blank already selected, fill it
  if (selectedBlankIdx !== null) fillBlank(selectedBlankIdx, idx, word);
}

function blankClick(idx) {
  // If blank already filled, return word to bank
  if (state.blanks[idx] !== null) {
    const oldWord = state.blanks[idx].word;
    const oldChipIdx = state.blanks[idx].chipIdx;
    state.blanks[idx] = null;
    const blankEl = document.getElementById('blank-' + idx);
    blankEl.textContent = '';
    blankEl.classList.remove('filled');
    if (oldChipIdx !== null) {
      const chip = document.getElementById('chip-' + oldChipIdx);
      if (chip) chip.classList.remove('used');
    }
    checkSubmit();
    return;
  }
  if (selectedChipIdx === null) return;
  const chip = document.getElementById('chip-' + selectedChipIdx);
  fillBlank(idx, selectedChipIdx, chip.textContent);
}

function fillBlank(blankIdx, chipIdx, word) {
  state.blanks[blankIdx] = { word, chipIdx };
  const blankEl = document.getElementById('blank-' + blankIdx);
  blankEl.textContent = word;
  blankEl.classList.add('filled');
  document.getElementById('chip-' + chipIdx).classList.add('used');
  selectedChipIdx = null;
  selectedBlankIdx = null;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  checkSubmit();
}

function checkSubmit() {
  const allFilled = state.blanks.every(b => b !== null);
  document.getElementById('submitBtn').disabled = !allFilled;
}

function submitGapFill() {
  let correct = 0;
  exercise.blanks.forEach((answer, i) => {
    const given = state.blanks[i]?.word?.toLowerCase().trim();
    if (given === answer.toLowerCase().trim()) correct++;
  });
  showScore(correct, exercise.blanks.length);
}

// ── MCQ ───────────────────────────────────────────────────────
function renderMCQ(el, section, isCombo) {
  const q = section.questions[state.currentQ];
  const total = section.questions.length;
  updateProgress(state.currentQ + 1, total);
  document.getElementById('headerProgress').textContent = (state.currentQ + 1) + '/' + total;

  const sectionBanner = isCombo ? `<div class="section-header ${state.comboSection}">${state.comboSection === 'english' ? '📖 English section' : '🔢 Maths section'}</div>` : '';

  el.innerHTML = `
    ${sectionBanner}
    ${exercise.context ? `<div class="context-box"><div class="context-label">Context</div>${exercise.context}</div>` : ''}
    <p class="instruction">${section.instruction || exercise.instruction}</p>
    <div class="question-counter">Question ${state.currentQ + 1} of ${total}</div>
    <div class="question-text">${q.question}</div>
    <div class="options" id="options">
      ${q.options.map((opt, i) => `<button class="option" id="opt-${i}" onclick="selectOption(${i},'${opt.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}', ${isCombo})">${opt}</button>`).join('')}
    </div>
  `;
}

function selectOption(idx, chosen, answer, isCombo) {
  document.querySelectorAll('.option').forEach(o => o.disabled = true);
  const isCorrect = chosen === answer;
  document.getElementById('opt-' + idx).classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    const opts = document.querySelectorAll('.option');
    const section = isCombo ? (state.comboSection === 'english' ? exercise.english_section : exercise.maths_section) : exercise;
    const q = section.questions[state.currentQ];
    opts.forEach((o, i) => { if (q.options[i] === answer) o.classList.add('correct'); });
  }
  if (isCorrect) {
    if (isCombo) {
      if (state.comboSection === 'english') state.comboEnglishScore.correct++;
      else state.comboMathsScore.correct++;
    } else {
      state.correct++;
    }
  }

  setTimeout(() => {
    state.currentQ++;
    const section = isCombo ? (state.comboSection === 'english' ? exercise.english_section : exercise.maths_section) : exercise;
    if (state.currentQ < section.questions.length) {
      renderExercise();
    } else if (isCombo && state.comboSection === 'english') {
      state.comboSection = 'maths';
      state.comboMathsScore.total = exercise.maths_section.questions.length;
      state.currentQ = 0;
      renderExercise();
    } else {
      if (isCombo) {
        const totalCorrect = state.comboEnglishScore.correct + state.comboMathsScore.correct;
        const totalQ = exercise.english_section.questions.length + exercise.maths_section.questions.length;
        showScore(totalCorrect, totalQ, true);
      } else {
        showScore(state.correct, exercise.questions.length);
      }
    }
  }, 1400);
}

// ── VOCAB MATCH ───────────────────────────────────────────────
function renderVocabMatch(el) {
  const pairs = [...exercise.pairs].sort(() => Math.random() - 0.5);
  const defs = [...exercise.pairs].map(p => p.definition).sort(() => Math.random() - 0.5);
  state.total = pairs.length;
  state.matchedCount = 0;
  state.selectedTerm = null;

  el.innerHTML = `
    <p class="instruction">${exercise.instruction}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div class="match-col-label">Term</div>
      <div class="match-col-label">Definition</div>
    </div>
    <div class="match-grid">
      <div class="match-col" id="terms">
        ${pairs.map((p,i) => `<div class="match-item" id="term-${i}" onclick="termClick(${i},'${p.term.replace(/'/g,"\\'")}')">${p.term}</div>`).join('')}
      </div>
      <div class="match-col" id="defs">
        ${defs.map((d,i) => `<div class="match-item" id="def-${i}" onclick="defClick(${i},'${d.replace(/'/g,"\\'")}')">${d}</div>`).join('')}
      </div>
    </div>
    <div style="text-align:center;font-size:13px;color:var(--muted);margin-top:12px" id="matchStatus">Tap a term, then tap its definition</div>
  `;
  // Store pairs for checking
  window._matchPairs = pairs;
  window._matchDefs = defs;
}

function termClick(idx, term) {
  document.querySelectorAll('.match-item').forEach(m => { if (!m.classList.contains('matched')) m.classList.remove('selected'); });
  state.selectedTerm = { idx, term };
  document.getElementById('term-' + idx).classList.add('selected');
}

function defClick(idx, def) {
  if (!state.selectedTerm) return;
  const correctDef = window._matchPairs.find(p => p.term === state.selectedTerm.term)?.definition;
  const termEl = document.getElementById('term-' + state.selectedTerm.idx);
  const defEl = document.getElementById('def-' + idx);

  if (def === correctDef) {
    termEl.classList.remove('selected');
    termEl.classList.add('matched');
    defEl.classList.add('matched');
    state.matchedCount++;
    state.correct++;
    if (state.matchedCount === state.total) {
      setTimeout(() => showScore(state.correct, state.total), 600);
    }
  } else {
    termEl.classList.add('wrong');
    defEl.classList.add('wrong');
    setTimeout(() => {
      termEl.classList.remove('wrong','selected');
      defEl.classList.remove('wrong');
    }, 600);
  }
  state.selectedTerm = null;
}

// ── SCORE SCREEN ──────────────────────────────────────────────
function showScore(correct, total, isCombo) {
  localStorage.removeItem('progress_' + EXERCISE_ID);
  document.getElementById('exerciseContent').style.display = 'none';
  const screen = document.getElementById('scoreScreen');
  screen.classList.add('show');

  const pct = Math.round((correct / total) * 100);
  const ring = document.getElementById('scoreRing');
  const pctEl = document.getElementById('scorePct');
  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '💪';
  const label = pct >= 80 ? 'Excellent work!' : pct >= 60 ? 'Good effort!' : 'Keep practising!';

  ring.className = 'score-ring ' + (pct >= 80 ? 'high' : pct >= 60 ? 'mid' : 'low');
  pctEl.className = 'score-pct ' + (pct >= 80 ? '' : pct >= 60 ? 'mid' : 'low');
  document.getElementById('scoreEmoji').textContent = emoji;
  pctEl.textContent = pct + '%';
  document.getElementById('scoreLabel').textContent = label;
  document.getElementById('scoreSub').textContent = correct + ' out of ' + total + ' correct';

  let breakdown = `<div class="score-breakdown-row"><span>Correct</span><span style="color:var(--g)">${correct}</span></div>
    <div class="score-breakdown-row"><span>Incorrect</span><span style="color:var(--error)">${total - correct}</span></div>`;
  if (isCombo) {
    breakdown += `<div class="score-breakdown-row"><span>English</span><span>${state.comboEnglishScore.correct}/${exercise.english_section.questions.length}</span></div>
    <div class="score-breakdown-row"><span>Maths</span><span>${state.comboMathsScore.correct}/${exercise.maths_section.questions.length}</span></div>`;
  }
  breakdown += `<div class="score-breakdown-row"><span>Score</span><span>${pct}%</span></div>`;
  document.getElementById('scoreBreakdown').innerHTML = breakdown;

  // Save result
  const timeSec = Math.round((Date.now() - state.startTime) / 1000);
  fetch('/api/results', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
    body: JSON.stringify({ exercise_id: EXERCISE_ID, score: correct, max_score: total, time_seconds: timeSec })
  }).catch(() => {});
}

function updateProgress(current, total) {
  if (!current || !total) return;
  document.getElementById('progressBar').style.width = ((current / total) * 100) + '%';
}

function retryExercise() {
  state = { selected: null, blanks: [], answers: [], matches: {}, currentQ: 0, correct: 0, total: 0, startTime: Date.now(), comboSection: 'english', comboEnglishScore:{correct:0,total:0}, comboMathsScore:{correct:0,total:0} };
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('exerciseContent').style.display = 'block';
  renderExercise();
}

function nextExercise() { window.location.href = '/practice'; }
function goBack() { window.history.back(); }

loadExercise();
</script>
</body>
</html>
